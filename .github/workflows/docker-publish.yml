name: Publish All Docker Images

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    # This matrix defines all the images we want to build
    strategy:
      fail-fast: false # If one fails, let the others finish
      matrix:
        include:
          # Main App
          - name: worldmonitor
            file: Dockerfile
          # AIS Relay
          - name: worldmonitor-ais-relay
            file: Dockerfile.relay
          # Cron: Resilience Validation
          - name: worldmonitor-resilience
            file: Dockerfile.seed-bundle-resilience-validation
          # Cron: Port Activity
          - name: worldmonitor-port-activity
            file: Dockerfile.seed-bundle-portwatch-port-activity
          # Cron: Digest Notifications
          - name: worldmonitor-digest
            file: Dockerfile.digest-notifications

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generates the tags and names the image dynamically based on the matrix
      # e.g., ghcr.io/your-username/worldmonitor-digest
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' || github.event_name == 'workflow_dispatch' }}
            type=sha,prefix=sha-

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max