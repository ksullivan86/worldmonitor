name: Publish All Docker Images

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # Main App
          - name: worldmonitor
            file: Dockerfile
            context: .
          # AIS Relay
          - name: worldmonitor-ais-relay
            file: Dockerfile.relay
            context: .
          # Redis REST Proxy
          - name: worldmonitor-redis-rest
            file: ./docker/Dockerfile.redis-rest
            context: ./docker
          # Cron: Resilience Validation
          - name: worldmonitor-resilience
            file: Dockerfile.seed-bundle-resilience-validation
            context: .
          # Cron: Port Activity
          - name: worldmonitor-port-activity
            file: Dockerfile.seed-bundle-portwatch-port-activity
            context: .
          # Cron: Digest Notifications
          - name: worldmonitor-digest
            file: Dockerfile.digest-notifications
            context: .

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' || github.event_name == 'workflow_dispatch' }}
            type=sha,prefix=sha-

      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          # Pass the Clerk key and custom self-hosting overrides into the build (defaults to empty string if secret is not set)
          build-args: |
            VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY || '' }}
            VITE_CUSTOM_SOURCE_CAP=9999
            VITE_ROOT_DOMAIN=yourdomain.com
            VITE_VARIANT=full
          cache-from: type=gha
          cache-to: type=gha,mode=max