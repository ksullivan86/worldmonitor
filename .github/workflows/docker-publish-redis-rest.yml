name: Publish Redis REST Image (Manual)

on:
  workflow_dispatch: # Allows you to manually trigger this from the GitHub UI

jobs:
  build-and-push-redis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/worldmonitor-redis-rest
          tags: |
            type=raw,value=latest

      - uses: docker/build-push-action@v5
        with:
          # Crucial: This explicitly sets the build context to the docker folder
          context: ./docker 
          file: ./docker/Dockerfile.redis-rest
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max